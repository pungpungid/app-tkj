{{define "content"}}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <h1 class="text-3xl font-bold text-gray-900 mb-8">Courses - Mikrotik Academy</h1>
    
    {{if .Courses}}
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {{range .Courses}}
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden card-hover animate-fade-in">
            <div class="h-48 bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center">
                <svg class="w-20 h-20 text-white opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
            </div>
            <div class="p-6">
                <div class="flex items-center justify-between mb-2">
                    <span class="badge {{if eq .Level "beginner"}}badge-success{{else if eq .Level "intermediate"}}badge-warning{{else}}badge-danger{{end}}">
                        {{.Level}}
                    </span>
                </div>
                <h2 class="text-xl font-semibold text-gray-900 mb-2">{{.Title}}</h2>
                <p class="text-gray-600 mb-4 line-clamp-3">{{.Description}}</p>
                <a href="/courses/{{.Slug}}" class="btn-primary w-full block text-center">
                    Start Learning
                </a>
            </div>
        </div>
        {{end}}
    </div>
    {{else}}
    <div class="text-center py-12">
        <svg class="w-16 h-16 text-gray-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <p class="text-gray-500 text-lg">No courses available yet.</p>
        <p class="text-gray-400 text-sm mt-2">Check back soon for new content!</p>
    </div>
    {{end}}
</div>
{{end}}
