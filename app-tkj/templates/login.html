{{define "content"}}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-xl p-8 animate-fade-in card-hover">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-900">Welcome Back</h2>
                <p class="text-gray-600 mt-2">Sign in to access your account</p>
            </div>

            <form class="ajax-form" method="POST" action="/login">
                <div class="mb-6">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" required 
                           class="form-input" placeholder="Enter your username" autocomplete="username">
                </div>

                <div class="mb-6">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" required 
                           class="form-input" placeholder="Enter your password" autocomplete="current-password">
                </div>

                <button type="submit" class="btn-primary w-full py-3">
                    Sign In
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/" class="text-sm text-gray-600 hover:text-gray-900 transition-colors">
                    ← Back to Home
                </a>
            </div>
        </div>

        <!-- Default Credentials Info -->
        <div class="mt-6 bg-blue-50 border border-blue-200 rounded-lg p-4 text-center">
            <p class="text-sm text-blue-800">
                <strong>Demo Credentials:</strong><br>
                Username: <code class="bg-blue-100 px-2 py-1 rounded">admin</code><br>
                Password: <code class="bg-blue-100 px-2 py-1 rounded">admin123</code>
            </p>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script>
// Mobile menu toggle
const mobileMenuBtn = document.getElementById('mobile-menu-btn');
const mobileMenu = document.getElementById('mobile-menu');

if (mobileMenuBtn && mobileMenu) {
    mobileMenuBtn.addEventListener('click', function() {
        mobileMenu.classList.toggle('hidden');
    });
}
</script>
{{end}}
